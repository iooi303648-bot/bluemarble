<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>지구 여행 블루마블 LAN</title>
  <style>
    :root {
      --ink:#2b2013; --muted:#6b5b3f; --line:#d8c9a3;
      --navy:#12233a; --gold:#d3a43a; --gold-light:#f0cf7c;
      --parchment-1:#fdf6e6; --parchment-2:#f1e2b6;
      --felt-1:#146a48; --felt-2:#0b4a32;
      --wood-1:#8a5a34; --wood-2:#5a381f;
      --rose:#c1394f; --blue:#2f6fa8; --green:#2f8f5b; --teal:#1f8fa0; --orange:#c07830;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--ink);
      overflow-x:hidden;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
      background:
        repeating-linear-gradient(125deg, rgba(255,255,255,.035) 0 3px, transparent 3px 7px),
        radial-gradient(circle at 18% 0%, rgba(255,255,255,.08), transparent 55%),
        linear-gradient(165deg, #7a4a28 0%, #52301a 55%, #3a2211 100%);
    }
    button,input { font:inherit; }
    button {
      border:2px solid rgba(255,255,255,.55); border-radius:10px; padding:.72rem .9rem;
      background:linear-gradient(180deg,#2f6fa8,#1f5688); color:#fff7e6; font-weight:900; cursor:pointer;
      box-shadow:0 7px 0 rgba(10,35,60,.35), 0 14px 20px rgba(0,0,0,.25);
      transition:transform .08s ease;
    }
    button:active:not(:disabled) { transform:translateY(3px); box-shadow:0 4px 0 rgba(10,35,60,.35), 0 8px 12px rgba(0,0,0,.22); }
    button:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
    button.light { background:linear-gradient(180deg,#fdf6e6,#f1e2b6); color:var(--ink); border-color:var(--line); box-shadow:0 6px 0 rgba(90,56,31,.25), 0 10px 16px rgba(0,0,0,.14); }
    button.good { background:linear-gradient(180deg,#2fa06b,#1f7a4f); }
    button.warn { background:linear-gradient(180deg,#f0cf7c,#d3a43a); color:#3a2b08; }
    button.dark { background:linear-gradient(180deg,#233150,#12203a); }

    .app { width:min(1420px,calc(100vw - 28px)); margin:0 auto; padding:18px 0 26px; }
    header {
      display:grid; grid-template-columns:1fr auto; gap:16px; align-items:center; margin-bottom:14px;
      padding:16px 22px; border-radius:14px; border:3px solid var(--gold);
      background:linear-gradient(160deg, rgba(18,35,58,.94), rgba(10,22,38,.94));
      box-shadow:0 18px 0 rgba(0,0,0,.28), 0 26px 46px rgba(0,0,0,.35), inset 0 0 0 2px rgba(255,255,255,.06);
      color:#fdf6e6;
    }
    h1 { margin:0; font-size:clamp(1.6rem,3vw,2.9rem); line-height:1.05; letter-spacing:.5px; text-shadow:0 3px 0 rgba(0,0,0,.35); }
    h1::before { content:"🌍 "; }
    .subtitle { margin:.4rem 0 0; color:rgba(253,246,230,.75); font-weight:700; }
    .timer {
      min-width:170px; padding:10px 16px; border:3px solid var(--gold); border-radius:10px;
      background:linear-gradient(180deg,#fdf6e6,#f1e2b6); text-align:center; color:var(--navy);
      box-shadow:0 10px 0 rgba(90,56,31,.28), 0 16px 26px rgba(0,0,0,.28);
    }
    .timer span { font-size:.7rem; font-weight:800; letter-spacing:.5px; color:var(--muted); }
    .timer strong { display:block; font-size:1.9rem; }

    .setup,.side-panel,.join-card {
      border:3px solid var(--gold); border-radius:12px;
      background:linear-gradient(160deg,var(--parchment-1),var(--parchment-2));
      box-shadow:0 14px 0 rgba(50,32,10,.22), 0 22px 40px rgba(0,0,0,.25);
    }
    .setup { margin-bottom:14px; padding:16px; display:grid; grid-template-columns:1fr auto; gap:14px; align-items:end; }
    .join-card { padding:16px; display:grid; gap:10px; position:relative; }
    .join-card::after { content:"🛫"; position:absolute; right:18px; top:14px; font-size:1.8rem; transform:rotate(-8deg); opacity:.85; }
    .join-line { display:grid; grid-template-columns:1fr auto auto; gap:8px; }
    .room-line { display:grid; grid-template-columns:88px 1fr; gap:8px; align-items:center; }
    input { width:100%; border:2px solid var(--line); border-radius:8px; padding:.66rem .75rem; font-weight:800; background:#fffdf6; color:var(--ink); }
    input:focus { outline:2px solid var(--blue); }
    .room { color:var(--muted); font-weight:700; line-height:1.5; display:flex; align-items:center; flex-wrap:wrap; }
    .room::before {
      content:"PASSPORT"; display:inline-grid; place-items:center; width:88px; height:26px; margin-right:10px;
      border-radius:4px; background:var(--navy); color:var(--gold-light); font-size:.68rem; letter-spacing:1px;
      font-weight:900; box-shadow:0 3px 0 rgba(0,0,0,.25);
    }

    .layout { display:grid; grid-template-columns:minmax(620px,1fr) 390px; gap:16px; align-items:start; }
    .board-panel {
      position:relative; overflow:hidden; padding:16px; border-radius:16px;
      background:linear-gradient(160deg, var(--wood-1), var(--wood-2));
      box-shadow:0 22px 0 rgba(0,0,0,.32), 0 34px 60px rgba(0,0,0,.4), inset 0 0 0 3px rgba(0,0,0,.2);
    }
    .world-map { position:absolute; inset:12% 10%; opacity:.16; pointer-events:none; filter:drop-shadow(0 6px 6px rgba(0,0,0,.3)); }
    .world-map path { fill:var(--gold-light); }
    .board {
      position:relative; display:grid; grid-template-columns:repeat(9,minmax(58px,1fr)); grid-template-rows:repeat(9,minmax(58px,1fr));
      gap:8px; min-height:min(76vh,760px); z-index:1; padding:10px; border-radius:10px;
      background:radial-gradient(ellipse at 50% 15%, rgba(255,255,255,.1), transparent 55%), linear-gradient(160deg, var(--felt-1), var(--felt-2));
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.14), inset 0 14px 34px rgba(0,0,0,.4);
    }

    .space {
      position:relative; min-height:58px; border-radius:8px; padding:6px; display:flex; flex-direction:column;
      justify-content:space-between; overflow:hidden; color:var(--ink);
      background:linear-gradient(165deg,var(--parchment-1),var(--parchment-2));
      border:2px solid #caa858;
      box-shadow:0 5px 0 rgba(40,25,8,.35), 0 9px 14px rgba(0,0,0,.28);
    }
    .space::before { content:""; position:absolute; inset:0 0 auto 0; height:7px; background:var(--blue); }
    .space.start::before { background:var(--gold); }
    .space.quiz::before { background:var(--blue); }
    .space.country::before { background:var(--green); }
    .space.ocean::before { background:var(--teal); }
    .space.continent::before { background:var(--orange); }
    .space.chance::before { background:var(--rose); }
    .space.current { outline:4px solid var(--gold-light); z-index:2; animation:currentPulse 1.3s ease-in-out infinite; }
    @keyframes currentPulse {
      0%,100% { box-shadow:0 0 0 4px rgba(240,207,124,.5), 0 9px 0 rgba(40,25,8,.35), 0 16px 24px rgba(0,0,0,.3); }
      50% { box-shadow:0 0 0 10px rgba(240,207,124,.15), 0 9px 0 rgba(40,25,8,.35), 0 16px 24px rgba(0,0,0,.3); }
    }
    .space.my-here { outline:3px solid var(--blue); }
    .space.my-here.current { outline:4px solid var(--gold-light); }
    .token.mover { animation:tokenBounce 1s ease-in-out infinite; }
    @keyframes tokenBounce { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
    .kind { font-size:.68rem; color:var(--muted); font-weight:900; margin-top:5px; display:flex; align-items:center; gap:3px; justify-content:center; }
    .name { font-size:.84rem; font-weight:900; line-height:1.18; text-align:center; word-break:keep-all; overflow-wrap:normal; hyphens:none; text-wrap:balance; }
    .space.long .name { font-size:.74rem; line-height:1.1; }
    .space.xlong .name { font-size:.66rem; line-height:1.08; }
    .emoji,.tile-icon { font-size:1.05rem; line-height:1; }
    .flag-badge {
      display:inline-flex; width:18px; height:13px; border-radius:2px; overflow:hidden; align-items:center; justify-content:center;
      background:#fff; font-size:.85rem; line-height:1; box-shadow:0 0 0 1px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.3);
    }
    .flag-badge img { width:100%; height:100%; object-fit:cover; display:block; }
    .owner {
      font-size:.66rem; font-weight:900; color:#fff; background:var(--owner-color,#888); border-radius:999px;
      padding:3px 7px; align-self:center; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.35);
    }
    .meta { font-size:.64rem; color:var(--muted); line-height:1.2; text-align:center; }

    .tokens { min-height:30px; display:flex; flex-wrap:wrap; gap:4px; align-items:flex-end; justify-content:center; }
    .token {
      display:inline-grid; place-items:center; width:20px; height:20px; border-radius:50%;
      background:radial-gradient(circle at 30% 25%, #fff, var(--piece,#2f6fa8) 60%);
      border:2px solid #fff; font-size:.78rem; line-height:1; font-weight:900; color:#fff;
      text-shadow:0 1px 2px rgba(0,0,0,.55);
      box-shadow:0 3px 0 rgba(0,0,0,.28), 0 5px 8px rgba(0,0,0,.3);
    }
    .player .token, .active-player .token, .result-row .token { width:30px; height:30px; font-size:1.05rem; }

    .space.center { grid-column:3/8; grid-row:3/8; justify-content:center; padding:18px; text-align:center;
      border:4px solid rgba(255,255,255,.7);
      background:linear-gradient(165deg, rgba(253,246,230,.95), rgba(241,226,182,.92));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.5), 0 12px 0 rgba(20,70,50,.2);
    }
    .center-globe { font-size:clamp(2.4rem,4vw,3.6rem); line-height:1; margin-bottom:4px; filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)); animation:globeSpin 8s linear infinite; display:inline-block; }
    @keyframes globeSpin { 0%,45%{ transform:rotate(0deg); } 50%{ transform:rotate(360deg); } 100%{ transform:rotate(360deg); } }
    .center-title { margin:0 0 8px; font-size:clamp(1.3rem,2.1vw,2.3rem); line-height:1.1; color:var(--navy); text-shadow:0 2px 0 rgba(255,255,255,.6); }
    .center-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
    .mini { border:2px solid rgba(20,70,50,.18); border-radius:8px; background:rgba(255,255,255,.74); padding:9px; min-height:78px; box-shadow:0 4px 0 rgba(20,70,50,.1); }
    .mini b { display:block; margin-bottom:4px; }
    .mini span { color:var(--muted); font-size:.82rem; line-height:1.32; }

    .side-panel { display:grid; gap:12px; padding:16px; }
    .turn-box { border:3px solid var(--gold); border-radius:10px; padding:12px; background:linear-gradient(180deg,#fffdf4,#f6e9c4); box-shadow:0 8px 0 rgba(90,56,31,.18); }
    .turn-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .active-player { display:flex; gap:9px; align-items:center; font-weight:900; font-size:1.1rem; color:var(--navy); }
    .dice {
      min-width:72px; height:72px; padding:0 10px; display:flex; gap:6px; align-items:center; justify-content:center;
      border-radius:12px; margin:8px auto 12px; width:fit-content;
      background:linear-gradient(160deg,#fff,#ecdfc0); border:3px solid var(--navy); color:var(--navy);
      font-size:2rem; font-weight:900; box-shadow:0 8px 0 rgba(20,35,58,.35), 0 14px 20px rgba(0,0,0,.2);
      transition:transform .1s ease;
    }
    .dice.rolling { animation:diceRoll .5s ease; }
    @keyframes diceRoll { 0%{ transform:rotate(0) scale(1); } 45%{ transform:rotate(210deg) scale(1.1); } 100%{ transform:rotate(360deg) scale(1); } }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .actions .wide { grid-column:1/-1; }
    .players { display:grid; gap:8px; }
    .player { display:grid; grid-template-columns:auto 1fr auto; gap:8px; align-items:center; padding:8px; border-radius:8px; border:2px solid var(--line); background:#fffdf6; }
    .player.active { border-color:var(--blue); box-shadow:0 0 0 3px rgba(47,111,168,.18); }
    .player.mine { background:#eefaf1; }
    .player small { display:block; color:var(--muted); font-weight:700; }
    .score { text-align:right; font-weight:900; color:var(--navy); }
    .log { height:140px; overflow:auto; border:2px solid var(--line); border-radius:8px; background:#fffdf6; padding:8px; font-size:.85rem; line-height:1.45; }
    .log p { margin:0 0 6px; }

    .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:18px; background:rgba(10,20,35,.62); z-index:20; }
    .modal.open { display:flex; }
    .dialog { width:min(620px,100%); border-radius:12px; background:linear-gradient(160deg,#fffdf4,#f1e2b6); border:3px solid var(--gold); box-shadow:0 24px 60px rgba(0,0,0,.4); overflow:hidden; }
    .dialog-head { display:flex; justify-content:space-between; gap:12px; align-items:center; padding:14px 16px; background:var(--navy); color:var(--gold-light); }
    .dialog-head h2 { margin:0; font-size:1.15rem; }
    .dialog-body { padding:16px; }
    .question { font-size:1.08rem; line-height:1.55; margin:0 0 14px; font-weight:900; color:var(--navy); }
    .choices { display:grid; gap:8px; margin-bottom:12px; }
    .choice { width:100%; text-align:left; background:#fffdf6; color:var(--ink); border:2px solid var(--line); box-shadow:0 4px 0 rgba(90,56,31,.14); font-weight:800; }
    .choice.correct { border-color:var(--green); background:#e6fbee; }
    .choice.wrong { border-color:var(--rose); background:#fdeced; }
    .explain { min-height:46px; border-radius:8px; background:#fffaf0; border:2px solid var(--line); padding:10px; color:#40331a; line-height:1.45; }
    .dialog-actions { display:flex; gap:8px; justify-content:flex-end; padding:0 16px 16px; }
    .results { display:grid; gap:8px; margin-top:12px; }
    .result-row { display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; border:2px solid var(--line); border-radius:8px; padding:10px; background:#fffdf6; }

    .travel-card {
      display:grid; gap:10px; padding:14px; border-radius:10px; border:3px dashed var(--navy); color:var(--navy);
      background:
        radial-gradient(circle at 0 50%, transparent 0 11px, #fffdf4 12px),
        radial-gradient(circle at 100% 50%, transparent 0 11px, #fffdf4 12px),
        linear-gradient(160deg,#fffdf4,#f1e2b6);
      box-shadow:0 8px 0 rgba(90,56,31,.16), 0 16px 28px rgba(0,0,0,.18);
    }
    .travel-card b { font-size:1.02rem; }
    .travel-card p { margin:0; line-height:1.45; font-weight:700; }
    .travel-card .choices { margin-bottom:0; }
    .travel-card.empty { opacity:.78; }

    .owned-panel { border:2px solid var(--line); border-radius:10px; padding:10px 12px; background:#fffdf6; }
    .owned-list { display:grid; gap:6px; }
    .owned-list .empty-note { margin:0; color:var(--muted); font-size:.84rem; }
    .owned-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 8px; border:1px solid var(--line); border-radius:8px; background:#fff; font-weight:800; font-size:.86rem; }
    .owned-row button { padding:.4rem .6rem; font-size:.78rem; box-shadow:none; border-radius:6px; }

    .toast {
      position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(16px);
      background:var(--navy); color:#fdf6e6; padding:12px 22px; border-radius:999px; font-weight:900;
      border:2px solid var(--gold); box-shadow:0 14px 30px rgba(0,0,0,.35);
      opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:30;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .mission { position:relative; margin:10px 0; padding:11px; border-radius:8px; background:linear-gradient(160deg,var(--gold-light),#fdf6e6); border:2px solid var(--gold); color:var(--navy); font-weight:900; text-align:center; box-shadow:0 5px 0 rgba(90,56,31,.14); }

    @keyframes tokenLand { 0%{ transform:scale(.3) translateY(-14px); opacity:0; } 60%{ transform:scale(1.2) translateY(2px); opacity:1; } 100%{ transform:scale(1) translateY(0); opacity:1; } }
    .token.landing { animation:tokenLand .45s cubic-bezier(.34,1.56,.64,1); }

    @keyframes choicePop { 0%{ transform:scale(1); } 40%{ transform:scale(1.06); } 100%{ transform:scale(1); } }
    @keyframes choiceShake { 0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-6px); } 40%{ transform:translateX(6px); } 60%{ transform:translateX(-4px); } 80%{ transform:translateX(4px); } }
    .choice.correct { animation:choicePop .4s ease; }
    .choice.wrong { animation:choiceShake .4s ease; }

    @keyframes soldPop {
      0% { opacity:0; transform:rotate(-12deg) scale(2.2); }
      20% { opacity:1; transform:rotate(-12deg) scale(1); }
      70% { opacity:1; transform:rotate(-12deg) scale(1); }
      100% { opacity:0; transform:rotate(-12deg) scale(1); }
    }
    .sold-stamp {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-size:1.05rem; font-weight:900; color:#fff; background:rgba(193,57,79,.85);
      border-radius:8px; z-index:5; pointer-events:none; animation:soldPop .9s ease forwards;
    }

    @keyframes floatUp { 0%{ opacity:0; transform:translate(-50%,0); } 15%{ opacity:1; } 100%{ opacity:0; transform:translate(-50%,-34px); } }
    .score-float { position:absolute; left:50%; top:-4px; transform:translateX(-50%); font-weight:900; font-size:1.1rem; pointer-events:none; animation:floatUp 1.2s ease forwards; }
    .score-float.up { color:var(--green); }
    .score-float.down { color:var(--rose); }

    @keyframes turnPulse {
      0% { box-shadow:0 8px 0 rgba(90,56,31,.18), 0 0 0 0 rgba(211,164,58,.6); }
      70% { box-shadow:0 8px 0 rgba(90,56,31,.18), 0 0 0 18px rgba(211,164,58,0); }
      100% { box-shadow:0 8px 0 rgba(90,56,31,.18), 0 0 0 0 rgba(211,164,58,0); }
    }
    .turn-box.turn-pulse { animation:turnPulse 1s ease-out 2; }

    .confetti-piece { position:fixed; top:-10px; width:8px; height:14px; opacity:.9; z-index:50; animation:confettiFall linear forwards; }
    @keyframes confettiFall { to { transform:translateY(110vh) rotate(540deg); opacity:0; } }
    .game-status { margin-top:16px; padding:14px 18px; border:3px solid var(--gold); border-radius:10px; background:linear-gradient(160deg,var(--parchment-1),var(--parchment-2)); box-shadow:0 12px 0 rgba(50,32,10,.2), 0 20px 40px rgba(0,0,0,.25); font-weight:900; text-align:center; color:var(--navy); }

    body[data-phase="playing"] .setup { display:none !important; }
    body[data-phase="playing"] header { grid-template-columns:1fr 150px; padding:12px 18px; margin-bottom:10px; }
    body[data-phase="playing"] h1 { font-size:clamp(1.45rem, 2.4vw, 2.4rem); }
    body[data-phase="playing"] .subtitle { display:none; }
    body[data-phase="playing"] .layout { grid-template-columns:minmax(820px, 1fr) 340px; }
    body[data-phase="playing"] .board-panel { min-height:calc(100vh - 142px); }
    body[data-phase="playing"] .side-panel { position:sticky; top:12px; padding:14px; max-height:calc(100vh - 138px); overflow:auto; gap:10px; }
    body[data-phase="playing"] .active-player { font-size:1.35rem; justify-content:center; width:100%; }
    body[data-phase="playing"] .dice { min-width:94px; height:94px; font-size:2.6rem; margin:10px auto 14px; }
    body[data-phase="playing"] .turn-box .actions { grid-template-columns:1fr; }
    body[data-phase="playing"] .turn-box .actions button { min-height:54px; font-size:1.05rem; }
    body[data-phase="playing"] .turn-box .actions button:disabled { display:none; }
    body[data-phase="playing"] .turn-box::before {
      content:"현재 차례"; display:block; width:max-content; margin:-2px auto 10px; padding:4px 12px; border-radius:999px;
      background:var(--navy); color:var(--gold-light); font-size:.78rem; font-weight:900;
    }
    body[data-phase="playing"] .log { max-height:94px; opacity:.86; }
    body[data-phase="playing"] .scoreboard h2, body[data-phase="playing"] .log-panel h2 { font-size:.8rem !important; color:var(--muted); }
    body[data-phase="playing"] .scoreboard { max-height:210px; overflow:auto; }
    body[data-phase="playing"] .log-panel { display:none; }
    body[data-phase="playing"] .players { gap:6px; }
    body[data-phase="playing"] .mission { font-size:1.05rem; line-height:1.38; }
    body[data-phase="playing"] .travel-card { min-height:150px; }
    body[data-phase="playing"] .travel-card b { font-size:1.18rem; }
    body[data-phase="playing"] .travel-card .choice { min-height:46px; text-align:center; }
    body[data-phase="playing"] .player { grid-template-columns:34px 1fr auto; min-height:50px; padding:6px; }
    body[data-phase="playing"] .player small { font-size:.76rem; line-height:1.25; }
    body[data-phase="playing"] .score { font-size:.85rem; }
    body[data-phase="playing"] .player:not(.active):not(.mine) { opacity:.82; }
    body[data-phase="playing"] .game-status { margin-top:10px; padding:10px 14px; font-size:.95rem; }

    body:not([data-phase="playing"]) .setup { grid-template-columns:1fr; max-width:960px; margin:0 auto 18px; }
    body:not([data-phase="playing"]) .setup > .actions { grid-template-columns:1fr 1fr; max-width:520px; width:100%; margin:0 auto; }
    body:not([data-phase="playing"]) .layout { max-width:1160px; margin:0 auto; grid-template-columns:1fr; }
    body:not([data-phase="playing"]) .side-panel { display:none; }
    body:not([data-phase="playing"]) .board-panel { min-height:560px; display:grid; place-items:center; }
    body:not([data-phase="playing"]) .board { width:min(100%,980px); min-height:540px; }

    body[data-phase="playing"] .app { width:min(1560px,calc(100vw - 24px)); padding-top:12px; }
    body[data-phase="playing"] .board {
      grid-template-columns:repeat(9,minmax(64px,1fr)); grid-template-rows:repeat(9,minmax(0,1fr));
      gap:9px; height:min(820px, calc(100vh - 164px)); min-height:552px;
    }
    body[data-phase="playing"] .space { min-height:0; padding:7px; justify-content:space-between; }
    body[data-phase="playing"] .kind { margin-top:3px; font-size:0; height:1.25rem; }
    body[data-phase="playing"] .emoji, body[data-phase="playing"] .tile-icon { display:block; font-size:1.2rem; margin-bottom:0; }
    body[data-phase="playing"] .flag-badge { width:26px; height:19px; }
    body[data-phase="playing"] .name { font-size:.8rem; line-height:1.12; min-height:1.75em; display:grid; place-items:center; }
    body[data-phase="playing"] .space.long .name { font-size:.7rem; }
    body[data-phase="playing"] .space.xlong .name { font-size:.62rem; }
    body[data-phase="playing"] .meta { display:none; }
    body[data-phase="playing"] .token { width:24px; height:24px; font-size:.92rem; }
    body[data-phase="playing"] .tokens { min-height:28px; gap:6px; padding-bottom:4px; align-content:flex-end; }
    body[data-phase="playing"] .center-grid { gap:7px; }
    body[data-phase="playing"] .mini { min-height:0; padding:7px; }
    body[data-phase="playing"] .mini span { font-size:.76rem; line-height:1.28; }

    @media (max-width:1050px) {
      .layout { grid-template-columns:1fr; }
      .side-panel { grid-template-columns:1fr 1fr; }
      .log { height:180px; }
    }
    @media (max-width:760px) {
      .app { width:min(100vw - 16px,720px); padding-top:10px; }
      header,.setup,.side-panel,.join-line,.room-line { grid-template-columns:1fr; }
      .board { grid-template-columns:repeat(9,minmax(34px,1fr)); grid-template-rows:repeat(9,minmax(45px,1fr)); gap:4px; min-height:540px; }
      .space { min-height:45px; padding:4px; }
      .space.center { padding:10px; }
      .kind,.meta { display:none; }
      .name { font-size:.62rem; line-height:1.12; }
      .space.long .name { font-size:.56rem; }
      .space.xlong .name { font-size:.5rem; }
      .center-grid { grid-template-columns:1fr; }
      .mini { min-height:auto; }
      .timer { min-width:0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>지구 여행 블루마블</h1>
        <p class="subtitle">같은 와이파이에서 각자 기기로 플레이</p>
      </div>
      <div class="timer"><span>남은 시간</span><strong id="timeLeft">20:00</strong></div>
    </header>

    <section class="setup" id="setup">
      <div class="join-card">
        <div class="room" id="roomInfo">이 주소를 같은 와이파이에 연결된 기기에서 열고 참가하세요.</div>
        <div class="room-line">
          <b>방 코드</b>
          <input id="roomCode" maxlength="12" placeholder="예: 1, 2, 3, 4, 5, 6">
        </div>
        <div class="join-line">
          <input id="playerName" maxlength="8" placeholder="이름">
          <button class="good" id="joinButton">참가</button>
          <button class="light" id="leaveButton">내 기기 초기화</button>
        </div>
      </div>
      <div class="actions">
        <button class="good" id="startGame">게임 시작</button>
        <button class="light" id="resetGame">새 방</button>
      </div>
    </section>

    <section class="layout">
      <div class="board-panel">
        <svg class="world-map" viewBox="0 0 900 430" aria-hidden="true">
          <path d="M108 95l42-30 75 8 42 28 9 40-58 28-74-12-48-20zM315 68l75-26 110 18 66 54-25 55-88 14-72-24-61 18-40-44zM585 83l96-14 61 29 35 54-39 34-87-8-55-36zM424 198l55 8 37 45-12 72-43 54-50-31-15-70zM598 231l88-22 82 44 17 75-54 44-103-14-58-68zM195 236l70 11 48 43-22 73-74 25-62-40-9-64z"/>
        </svg>
        <div class="board" id="board"></div>
      </div>

      <aside class="side-panel">
        <div class="turn-box">
          <div class="turn-head">
            <div class="active-player" id="activePlayer">대기 중</div>
            <button class="light" id="endGame">마치기</button>
          </div>
          <div class="mission" id="missionText">이름을 넣고 참가하세요.</div>
          <div class="dice" id="dice">⚀ ⚀</div>
          <div class="actions">
            <button id="rollDice">🎲 주사위 굴리기</button>
            <button class="warn" id="showCard">🛂 카드 읽기</button>
            <button class="good" id="buySpace">🏠 마일리지로 사기</button>
            <button class="light" id="sellSpace">💰 팔기</button>
            <button class="light" id="escapeIsland" style="display:none">🏝️ 20M 내고 탈출</button>
            <button class="good" id="launchSpace" style="display:none">🚀 콜롬비아호 발사</button>
            <button class="wide dark" id="nextTurn">➡️ 차례 넘기기</button>
          </div>
          <select id="launchTarget" style="display:none;margin-top:6px;"></select>
        </div>
        <div class="travel-card" id="travelCard">
          <b>여권 카드</b>
          <p>주사위를 굴리면 도착한 곳의 카드가 여기에 나타납니다.</p>
        </div>
        <div class="owned-panel" id="bankPanel">
          <h2 style="margin:0 0 8px;font-size:1rem;">은행</h2>
          <div id="bankInfo"></div>
        </div>
        <div class="owned-panel">
          <h2 style="margin:0 0 8px;font-size:1rem;">내 소유 땅</h2>
          <div class="owned-list" id="myProperties"></div>
        </div>
        <div class="scoreboard">
          <h2 style="margin:0 0 8px;font-size:1rem;">탐험 기록</h2>
          <div class="players" id="players"></div>
        </div>
        <div class="log-panel" style="grid-column:1/-1;">
          <h2 style="margin:0 0 8px;font-size:1rem;">진행 알림</h2>
          <div class="log" id="log"></div>
        </div>
      </aside>
    </section>
    <section class="game-status" id="gameStatus">방을 고르고 이름을 넣은 뒤 참가하세요.</section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="dialog">
      <div class="dialog-head">
        <h2 id="modalTitle">카드</h2>
        <button class="light" id="closeModal">닫기</button>
      </div>
      <div class="dialog-body" id="modalBody"></div>
      <div class="dialog-actions" id="modalActions"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let state = null;
    let myId = localStorage.getItem("worldBlueMarbleLanPlayerId") || "";
    let lastCardId = "";
    let lastTollId = "";
    let roomCode = new URLSearchParams(location.search).get("room") || localStorage.getItem("worldBlueMarbleRoomCode") || "1";
    let prevPlayers = {};
    let prevProperties = {};
    let prevCurrentId = null;

    const board = document.getElementById("board");
    const playersEl = document.getElementById("players");
    const logEl = document.getElementById("log");
    const activePlayerEl = document.getElementById("activePlayer");
    const diceEl = document.getElementById("dice");
    const timeLeftEl = document.getElementById("timeLeft");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalActions = document.getElementById("modalActions");

    const countryCodes = {
      "대한민국":"kr", "일본":"jp", "중국":"cn", "사우디아라비아":"sa", "이집트":"eg", "케냐":"ke",
      "프랑스":"fr", "영국":"gb", "미국":"us", "캐나다":"ca", "브라질":"br", "오스트레일리아":"au"
    };
    const flagCss = {
      kr: "linear-gradient(180deg,#fff 0 34%,#c60c30 34% 66%,#003478 66% 100%)",
      jp: "radial-gradient(circle at 50% 50%,#bc002d 0 34%,#fff 35% 100%)",
      cn: "#de2910",
      sa: "#046a38",
      eg: "linear-gradient(180deg,#ce1126 0 33%,#fff 33% 66%,#000 66% 100%)",
      ke: "linear-gradient(180deg,#000 0 30%,#fff 30% 36%,#bb0000 36% 64%,#fff 64% 70%,#006600 70% 100%)",
      fr: "linear-gradient(90deg,#0055a4 0 33%,#fff 33% 66%,#ef4135 66% 100%)",
      gb: "linear-gradient(180deg,#00247d 0 34%,#fff 34% 44%,#cf142b 44% 56%,#fff 56% 66%,#00247d 66% 100%)",
      us: "linear-gradient(180deg,#b22234 0 20%,#fff 20% 40%,#b22234 40% 60%,#fff 60% 80%,#b22234 80% 100%)",
      ca: "linear-gradient(90deg,#ff0000 0 25%,#fff 25% 75%,#ff0000 75% 100%)",
      br: "#009739",
      au: "#00247d"
    };
    function flagFallback(img) {
      const badge = img.parentElement;
      badge.style.background = flagCss[img.dataset.code] || "#ccc";
      img.remove();
    }
    const continentEmoji = {"아시아":"🌏","아프리카":"🌍","북아메리카":"🗽","남아메리카":"🌴","남극 대륙":"🧊","오세아니아":"🏝️"};
    const oceanEmoji = {"태평양":"🌊","대서양":"⚓","인도양":"🐚","남극해":"🧊"};
    const conceptEmoji = {"위도":"🌐","경도":"🧭","대륙":"⛰️","디지털 지도":"💻","영토 특징":"📐","대양":"🌊"};
    const diceFaces = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
    const buildLevelNames = ["대지", "별장", "빌딩", "호텔"];
    function tileIcon(space) {
      if (space.type === "continent") return continentEmoji[space.name] || "🗺️";
      if (space.type === "ocean") return oceanEmoji[space.name] || "🌊";
      if (space.type === "quiz") return conceptEmoji[space.name] || "🧭";
      if (space.type === "chance") return "🔑";
      if (space.type === "start") return "🛫";
      if (space.type === "island") return "🏝️";
      if (space.type === "space") return "🚀";
      if (space.type === "fund_pay") return "🏦";
      if (space.type === "fund_take") return "🎁";
      return "🌍";
    }
    function pieceFor(playerId) {
      const p = state && state.players.find(pl => pl.id === playerId);
      return p ? [...p.name][0] : "?";
    }
    function boardPos(i) {
      if (i <= 8) return {gridColumn:i + 1, gridRow:1};
      if (i <= 16) return {gridColumn:9, gridRow:i - 7};
      if (i <= 24) return {gridColumn:25 - i, gridRow:9};
      return {gridColumn:1, gridRow:33 - i};
    }
    function kindLabel(type) {
      return {start:"출발", quiz:"개념", country:"나라", ocean:"대양", continent:"대륙", chance:"황금열쇠", island:"무인도", space:"우주여행", fund_pay:"기금 접수", fund_take:"기금 수령"}[type] || "";
    }
    function roomValue() {
      const value = document.getElementById("roomCode")?.value || roomCode || "1";
      roomCode = value.trim().replace(/[^\w가-힣-]/g, "").slice(0, 12) || "1";
      localStorage.setItem("worldBlueMarbleRoomCode", roomCode);
      return roomCode;
    }
    const BUILD_COST = [0, 40, 60, 80];
    const BUILD_RENT_MULT = [1, 3, 6, 10];
    function isBuyable(space) {
      return space && ["country", "continent", "ocean"].includes(space.type);
    }
    function isBuildable(space) {
      return space && space.type === "country";
    }
    function buildingLevel(index) {
      return (state && state.buildings && state.buildings[index]) || 0;
    }
    function nextBuildCost(index) {
      const lvl = buildingLevel(index);
      return lvl >= 3 ? null : BUILD_COST[lvl + 1];
    }
    function assetValue(index) {
      const space = state.boardSpaces[index];
      let value = propertyCost(space);
      const lvl = buildingLevel(index);
      for (let l = 1; l <= lvl; l++) value += BUILD_COST[l];
      return value;
    }
    function propertyCost(space) {
      if (!space) return 0;
      if (space.type === "country") return 40;
      if (space.type === "continent") return 60;
      if (space.type === "ocean") return 80;
      return 0;
    }
    function baseRent(space) {
      if (!space) return 0;
      if (space.type === "country") return 15;
      if (space.type === "continent") return 25;
      if (space.type === "ocean") return 35;
      return 0;
    }
    function propertyRent(space, index) {
      if (!space) return 0;
      const lvl = isBuildable(space) ? buildingLevel(index) : 0;
      return baseRent(space) * BUILD_RENT_MULT[lvl];
    }
    function currentPlayer() {
      return state && state.players[state.current];
    }
    function isMyTurn() {
      const p = currentPlayer();
      return !!p && p.id === myId && state.phase === "playing";
    }
    function timeText(seconds) {
      const m = Math.max(0, Math.floor(seconds / 60)).toString().padStart(2, "0");
      const s = Math.max(0, seconds % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }
    async function api(action, data = {}) {
      const res = await fetch("/api/action", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action, playerId:myId, room:roomValue(), ...data})
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "요청 실패");
      if (json.playerId) {
        myId = json.playerId;
        localStorage.setItem("worldBlueMarbleLanPlayerId", myId);
      }
      state = json.state;
      render();
    }
    async function refresh() {
      try {
        const res = await fetch(`/api/state?room=${encodeURIComponent(roomValue())}`, {cache:"no-store"});
        state = await res.json();
        render();
      } catch (err) {
        activePlayerEl.textContent = "서버 연결 대기 중";
      }
    }
    function renderBoard() {
      if (!state || !state.boardSpaces) return;
      if (board.dataset.built !== String(state.boardSpaces.length)) {
        buildBoard();
        board.dataset.built = String(state.boardSpaces.length);
      }
      updateOwners();
    }
    function buildBoard() {
      board.innerHTML = "";
      state.boardSpaces.forEach((space, i) => {
        const pos = boardPos(i);
        const cell = document.createElement("div");
        cell.className = `space ${space.type}`;
        if (space.name.length >= 6) cell.classList.add("long");
        if (space.name.length >= 8) cell.classList.add("xlong");
        cell.dataset.index = i;
        cell.style.gridColumn = pos.gridColumn;
        cell.style.gridRow = pos.gridRow;
        const price = isBuyable(space) ? "" : `<div class="meta">${space.meta || ""}</div>`;
        const meta = isBuyable(space) ? `<div class="meta meta-slot"></div>` : price;
        const code = countryCodes[space.name];
        const iconHtml = space.type === "country" && code
          ? `<span class="flag-badge"><img src="assets/flags/${code}.png" alt="${space.name} 국기" data-code="${code}" onerror="flagFallback(this)"></span>`
          : `<span class="emoji">${tileIcon(space)}</span>`;
        cell.innerHTML = `<div><div class="kind">${iconHtml} ${kindLabel(space.type)}</div><div class="name">${space.name}</div>${meta}</div><div class="owner-slot"></div><div class="tokens"></div>`;
        board.appendChild(cell);
      });
      const center = document.createElement("div");
      center.className = "space center";
      center.innerHTML = `
        <span class="center-globe">🌍</span>
        <h2 class="center-title">세계 여행 보드판</h2>
        <div class="center-grid">
          <div class="mini"><b>🛂 여권 도장</b><span>문제를 맞히며 나라와 대륙 도장을 모읍니다.</span></div>
          <div class="mini"><b>🏠 사고 팔기</b><span>정답을 맞힌 칸만 살 수 있고, 친구가 오면 통행료를 받습니다.</span></div>
          <div class="mini"><b>🔑 황금열쇠</b><span>이동, 보너스, 감점 같은 여행 사건이 바로 일어납니다.</span></div>
        </div>`;
      board.appendChild(center);
    }
    function updateOwners() {
      state.boardSpaces.forEach((space, i) => {
        const metaSlot = document.querySelector(`.space[data-index="${i}"] .meta-slot`);
        if (metaSlot && isBuyable(space)) {
          const lvl = buildingLevel(i);
          const lvlText = isBuildable(space) && lvl > 0 ? ` · ${buildLevelNames[lvl]}` : "";
          metaSlot.textContent = `구입 ${propertyCost(space)} · 통행료 ${propertyRent(space, i)}${lvlText}`;
        }
        const slot = document.querySelector(`.space[data-index="${i}"] .owner-slot`);
        if (!slot) return;
        const owner = state.players.find(p => state.properties && state.properties[i] === p.id);
        slot.innerHTML = owner ? `<div class="owner" style="--owner-color:${owner.color}">${owner.name}</div>` : "";
      });
    }
    function renderTokens(movedPlayers) {
      document.querySelectorAll(".space").forEach(s => s.classList.remove("current", "my-here"));
      document.querySelectorAll(".tokens").forEach(t => t.innerHTML = "");
      if (!state) return;
      state.players.forEach((p, idx) => {
        const cell = document.querySelector(`.space[data-index="${p.pos}"]`);
        if (!cell) return;
        const token = document.createElement("span");
        const isMover = idx === state.current && state.phase === "playing";
        token.className = "token" + (movedPlayers && movedPlayers.has(p.id) ? " landing" : "") + (isMover ? " mover" : "");
        token.style.setProperty("--piece", p.color);
        token.textContent = pieceFor(p.id);
        token.title = p.name;
        cell.querySelector(".tokens").appendChild(token);
        if (p.id === myId) cell.classList.add("my-here");
        if (idx === state.current && state.phase === "playing") cell.classList.add("current");
      });
    }
    function renderPlayers() {
      playersEl.innerHTML = "";
      if (!state) return;
      state.players.forEach((p, idx) => {
        const row = document.createElement("div");
        row.className = `player ${idx === state.current && state.phase === "playing" ? "active" : ""} ${p.id === myId ? "mine" : ""}`;
        const place = state.boardSpaces[p.pos]?.name || "출발";
        const bankruptTag = p.bankrupt ? " · 파산" : "";
        row.innerHTML = `<span class="token" style="--piece:${p.color}">${pieceFor(p.id)}</span><div><b>${p.name}${p.id === myId ? " · 나" : ""}</b><small>도장 ${p.stamps.length}개 · 현재 ${place}${bankruptTag}</small></div><div class="score">${p.score}M</div>`;
        playersEl.appendChild(row);
      });
    }
    function renderControls() {
      document.body.dataset.phase = state.phase || "lobby";
      const cp = currentPlayer();
      const mine = isMyTurn();
      const pending = state && state.pendingCard;
      const currentSpace = cp && state.boardSpaces[cp.pos];
      const ownerId = cp && state.properties ? state.properties[cp.pos] : null;
      const hasBuyRight = state.buyRights && state.buyRights[myId] === cp?.pos;
      const canManageLand = mine && state.rolled && (!pending || pending.answered) && isBuyable(currentSpace);
      const stuck = mine && cp.island > 0;
      const canLaunch = mine && cp.spaceTravel && !state.rolled && (!pending || pending.answered);
      activePlayerEl.innerHTML = cp ? `<span class="token" style="--piece:${cp.color}">${pieceFor(cp.id)}</span><span>${cp.name} 차례</span>` : "참가 대기 중";
      const diceArr = Array.isArray(state.dice) ? state.dice : [state.dice, state.dice];
      diceEl.textContent = `${diceFaces[diceArr[0]] || "⚀"} ${diceFaces[diceArr[1]] || "⚀"}`;
      document.getElementById("rollDice").disabled = !(mine && !state.rolled && !pending);
      document.getElementById("showCard").disabled = !(pending && pending.playerId === myId);
      document.getElementById("buySpace").disabled = !(canManageLand && hasBuyRight && !ownerId && cp.score >= propertyCost(currentSpace));
      document.getElementById("sellSpace").disabled = !(canManageLand && ownerId === myId);
      document.getElementById("nextTurn").disabled = !(mine && state.rolled && (!pending || pending.answered));
      document.getElementById("startGame").disabled = !(state.phase === "lobby" && state.players.length >= 2);
      document.getElementById("resetGame").disabled = false;
      document.getElementById("endGame").disabled = state.phase !== "playing";
      document.getElementById("joinButton").disabled = state.phase !== "lobby" || state.players.length >= 6;
      timeLeftEl.textContent = timeText(state.secondsLeft);
      document.getElementById("setup").style.display = state.phase === "finished" ? "grid" : "grid";

      const escapeBtn = document.getElementById("escapeIsland");
      escapeBtn.style.display = stuck ? "block" : "none";
      escapeBtn.disabled = !(stuck && cp.score >= 20 || stuck);
      const launchBtn = document.getElementById("launchSpace");
      const launchSelect = document.getElementById("launchTarget");
      launchBtn.style.display = canLaunch ? "block" : "none";
      launchSelect.style.display = canLaunch ? "block" : "none";
      if (canLaunch && launchSelect.dataset.filled !== "1") {
        launchSelect.innerHTML = state.boardSpaces.map((s, i) => `<option value="${i}">${s.name}</option>`).join("");
        launchSelect.dataset.filled = "1";
      }
      if (!canLaunch) launchSelect.dataset.filled = "0";

      renderBank(cp, mine);

      const missionEl = document.getElementById("missionText");
      const statusEl = document.getElementById("gameStatus");
      let mission = "이름을 넣고 참가하세요.";
      if (state.phase === "lobby") mission = state.players.length < 2 ? "2명 이상 모이면 시작할 수 있어요." : "게임 시작을 눌러 여행을 떠나세요.";
      else if (state.phase === "finished") mission = "게임이 끝났습니다. 결과를 확인하세요.";
      else if (!mine) mission = `${cp?.name || "친구"} 차례를 기다리세요.`;
      else if (stuck) mission = `무인도에 갇혔어요! 더블이 나오면 탈출, 아니면 20M을 내고 탈출할 수 있어요. (남은 턴 ${cp.island})`;
      else if (canLaunch) mission = "콜롬비아호 발사 준비 완료! 이동할 곳을 고르고 발사하거나, 그냥 주사위를 굴려도 돼요.";
      else if (!state.rolled) mission = "주사위 두 개를 굴리세요. 더블이 나오면 한 번 더 굴릴 수 있어요.";
      else if (pending && pending.playerId === myId && !pending.answered) mission = "카드를 읽고 정답을 고르세요.";
      else if (hasBuyRight && !ownerId) mission = `${currentSpace.name}을 ${propertyCost(currentSpace)}M로 살 수 있어요. 친구가 오면 ${propertyRent(currentSpace, cp.pos)}M 통행료를 받아요.`;
      else mission = "다음 차례로 넘기세요.";
      missionEl.textContent = mission;
      statusEl.textContent = state.phase === "playing"
        ? `${state.era} · 현재 위치: ${cp ? state.boardSpaces[cp.pos].name : "-"} · ${cp ? `${cp.name} ${cp.score}M` : ""} · 🟡번쩍이는 칸=차례인 친구, 🔵테두리=내 위치`
        : `방 ${state.roomCode || roomCode} · 2~6명이 참가합니다.`;
    }
    function renderBank(cp, mine) {
      const bankInfo = document.getElementById("bankInfo");
      if (!bankInfo || state.phase !== "playing") { if (bankInfo) bankInfo.innerHTML = ""; return; }
      const me = state.players.find(p => p.id === myId);
      let html = `<p style="margin:0 0 8px;color:var(--muted);font-size:.82rem;">사회복지기금 ${state.welfareFund}M 적립 중 · ${state.era}</p>`;
      if (state.loanRequest) {
        const req = state.loanRequest;
        if (req.playerId === myId) {
          html += `<p style="margin:0;font-weight:800;">내 대출 ${req.amount}M 신청 중... 친구의 동의를 기다려요.</p>`;
        } else {
          html += `<div class="owned-row"><span>${req.playerName}의 대출 ${req.amount}M</span><button class="good" id="approveLoanBtn">동의하기</button></div>`;
        }
      } else if (me && !me.loanUsed) {
        html += `<div class="owned-row"><span>은행 대출 (최대 100M, 1회)</span><button class="light" id="requestLoanBtn">신청하기</button></div>`;
      } else if (me && me.loanAmount > 0) {
        html += `<p style="margin:0;color:var(--rose);font-weight:800;">대출 ${me.loanAmount}M · ${me.loanTurnsLeft}턴 안에 상환해야 해요.</p>`;
      }
      bankInfo.innerHTML = html;
      const approveBtn = document.getElementById("approveLoanBtn");
      if (approveBtn) approveBtn.onclick = async () => { try { await api("approveLoan"); } catch (err) { alert(err.message); } };
      const requestBtn = document.getElementById("requestLoanBtn");
      if (requestBtn) requestBtn.onclick = async () => {
        const amt = prompt("대출받을 금액을 입력하세요 (최대 100M)", "100");
        if (!amt) return;
        try { await api("requestLoan", {amount: Number(amt)}); } catch (err) { alert(err.message); }
      };
    }
    function renderLog() {
      logEl.innerHTML = "";
      (state.logs || []).slice(0, 20).forEach(item => {
        const p = document.createElement("p");
        p.textContent = item;
        logEl.appendChild(p);
      });
    }
    function renderRoom() {
      const me = state.players.find(p => p.id === myId);
      const status = state.phase === "lobby" ? "참가 대기" : state.phase === "playing" ? "게임 중" : "게임 종료";
      const roomUrl = `${location.origin}${location.pathname}?room=${encodeURIComponent(state.roomCode || roomCode)}`;
      document.getElementById("roomInfo").textContent = `방 ${state.roomCode || roomCode} · ${status} · 참가 ${state.players.length}/6명 · ${roomUrl}${me ? ` · 내 이름: ${me.name}` : ""}`;
    }
    function detectMovedPlayers() {
      const moved = new Set();
      state.players.forEach(p => {
        const prev = prevPlayers[p.id];
        if (prev && prev.pos !== p.pos) moved.add(p.id);
      });
      return moved;
    }
    function detectNewlySold() {
      const sold = [];
      Object.keys(state.properties || {}).forEach(idx => {
        if (!(idx in prevProperties)) sold.push(Number(idx));
      });
      return sold;
    }
    function detectMyScoreDelta() {
      const me = state.players.find(p => p.id === myId);
      const prev = prevPlayers[myId];
      if (me && prev && typeof prev.score === "number" && me.score !== prev.score) return me.score - prev.score;
      return 0;
    }
    function detectTurnStart() {
      const cp = currentPlayer();
      return !!(cp && cp.id === myId && prevCurrentId !== myId && state.phase === "playing" && prevCurrentId !== null);
    }
    function updateSnapshot() {
      const nextPlayers = {};
      state.players.forEach(p => { nextPlayers[p.id] = {pos: p.pos, score: p.score}; });
      prevPlayers = nextPlayers;
      prevProperties = {...(state.properties || {})};
      const cp = currentPlayer();
      prevCurrentId = cp ? cp.id : null;
    }
    function flashSold(idx) {
      const cell = document.querySelector(`.space[data-index="${idx}"]`);
      if (!cell) return;
      const stamp = document.createElement("div");
      stamp.className = "sold-stamp";
      stamp.textContent = "SOLD!";
      cell.appendChild(stamp);
      setTimeout(() => stamp.remove(), 900);
    }
    function floatScore(delta) {
      const el = document.createElement("div");
      el.className = "score-float " + (delta > 0 ? "up" : "down");
      el.textContent = (delta > 0 ? "+" : "") + delta + "M";
      const host = document.getElementById("missionText");
      host.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }
    function pulseTurnBox() {
      const box = document.querySelector(".turn-box");
      if (!box) return;
      box.classList.remove("turn-pulse");
      void box.offsetWidth;
      box.classList.add("turn-pulse");
      showToast("🎲 내 차례예요!");
    }
    function launchConfetti() {
      const colors = ["#d3a43a", "#2f6fa8", "#2f8f5b", "#c1394f", "#1f8fa0", "#f0cf7c"];
      for (let i = 0; i < 28; i++) {
        const el = document.createElement("div");
        el.className = "confetti-piece";
        el.style.left = Math.random() * 100 + "vw";
        el.style.background = colors[i % colors.length];
        el.style.animationDuration = (2 + Math.random() * 1.5) + "s";
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }
    }
    function render() {
      if (!state) return;
      const movedPlayers = detectMovedPlayers();
      const soldTiles = detectNewlySold();
      const myScoreDelta = detectMyScoreDelta();
      const turnJustStarted = detectTurnStart();
      renderBoard();
      renderTokens(movedPlayers);
      renderPlayers();
      renderControls();
      renderTravelCard();
      renderMyProperties();
      renderLog();
      renderRoom();
      checkTollEvent();
      soldTiles.forEach(flashSold);
      if (myScoreDelta) floatScore(myScoreDelta);
      if (turnJustStarted) pulseTurnBox();
      updateSnapshot();
      if (state.phase === "finished") showResults();
      else if (state.pendingCard && state.pendingCard.id !== lastCardId && state.pendingCard.playerId === myId) showCard();
      else if (!state.pendingCard && modal.classList.contains("open") && modal.dataset.auto === "card") closeModal();
    }
    function renderMyProperties() {
      const panel = document.getElementById("myProperties");
      if (!panel || !state) return;
      const owned = Object.entries(state.properties || {})
        .filter(([, ownerId]) => ownerId === myId)
        .map(([idx]) => Number(idx));
      if (!owned.length) {
        panel.innerHTML = `<p class="empty-note">아직 소유한 땅이 없어요.</p>`;
        return;
      }
      const canSell = isMyTurn();
      const canBuild = isMyTurn() && !state.rolled;
      panel.innerHTML = owned.map(idx => {
        const space = state.boardSpaces[idx];
        const lvl = buildingLevel(idx);
        const refund = Math.ceil(assetValue(idx) * 0.7);
        const buildCost = nextBuildCost(idx);
        const buildBtn = isBuildable(space) && buildCost !== null
          ? `<button class="good build-owned" data-index="${idx}" ${canBuild ? "" : "disabled"}>${buildLevelNames[lvl + 1]} 짓기 -${buildCost}M</button>`
          : "";
        return `<div class="owned-row"><span>${space.name}${lvl ? ` (${buildLevelNames[lvl]})` : ""}</span><div style="display:flex;gap:6px;">${buildBtn}<button class="light sell-owned" data-index="${idx}" ${canSell ? "" : "disabled"}>팔기 +${refund}M</button></div></div>`;
      }).join("");
      panel.querySelectorAll(".sell-owned").forEach(btn => {
        btn.onclick = async () => {
          try { await api("sell", {index: Number(btn.dataset.index)}); }
          catch (err) { alert(err.message); }
        };
      });
      panel.querySelectorAll(".build-owned").forEach(btn => {
        btn.onclick = async () => {
          try { await api("build", {index: Number(btn.dataset.index)}); }
          catch (err) { alert(err.message); }
        };
      });
    }
    function showToast(text) {
      const el = document.getElementById("toast");
      el.textContent = text;
      el.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.classList.remove("show"), 2600);
    }
    function checkTollEvent() {
      const t = state.tollEvent;
      if (!t || t.id === lastTollId) return;
      lastTollId = t.id;
      if (t.payerId === myId) showToast(`💸 ${t.ownerName}에게 ${t.spaceName} 통행료 ${t.amount}M을 냈습니다.`);
      else if (t.ownerId === myId) showToast(`💰 ${t.payerName}에게서 ${t.spaceName} 통행료 ${t.amount}M을 받았습니다.`);
    }
    function renderTravelCard() {
      const panel = document.getElementById("travelCard");
      const card = state && state.pendingCard;
      const cp = currentPlayer();
      const currentSpace = cp && state.boardSpaces[cp.pos];
      if (!panel) return;
      if (!card) {
        panel.className = "travel-card empty";
        const landText = currentSpace && isBuyable(currentSpace)
          ? `<p>구입 ${propertyCost(currentSpace)}M · 통행료 ${propertyRent(currentSpace, cp.pos)}M</p>`
          : "";
        panel.innerHTML = `<b>🛂 여권 카드</b><p>${currentSpace ? `현재 여행지는 ${currentSpace.name}입니다.` : "주사위를 굴리면 도착 카드가 여기에 나타납니다."}</p>${landText}`;
        return;
      }
      panel.className = "travel-card";
      if (card.playerId !== myId) {
        const owner = state.players.find(p => p.id === card.playerId);
        panel.innerHTML = `<b>🛂 ${owner ? owner.name : "친구"}의 카드</b><p>친구가 카드를 확인하는 중입니다. 잠깐 기다리세요.</p>`;
        return;
      }
      panel.innerHTML = `<b>🔔 카드가 도착했어요</b><p>${card.type === "chance" ? card.title : `${card.space.name} 미션`}이 팝업으로 떴어요. 안 보이면 "카드 읽기" 버튼을 눌러주세요.</p>`;
    }
    function showCard() {
      const card = state.pendingCard;
      if (!card) return;
      lastCardId = card.id;
      modal.dataset.auto = "card";
      modalTitle.textContent = card.type === "quiz" ? `${card.space.name} 카드` : card.title;
      if (card.type === "chance") {
        modalBody.innerHTML = `<p class="question">${card.text}</p><div class="explain">황금열쇠 효과가 바로 적용되었습니다.</div>`;
        modalActions.innerHTML = `<button id="doneCard">확인</button>`;
        document.getElementById("doneCard").onclick = closeModal;
        openModal();
        return;
      }
      const buyInfo = isBuyable(card.space) ? ` 정답을 맞히면 ${propertyCost(card.space)}M으로 사고, 친구가 오면 ${propertyRent(card.space, card.space.index)}M 통행료를 받아요.` : "";
      modalBody.innerHTML = `<p class="question">${card.question}</p><div class="choices"></div><div class="explain">${card.answered ? card.explain : `정답을 맞히면 2M을 얻습니다.${buyInfo}`}</div>`;
      const choices = modalBody.querySelector(".choices");
      card.choices.forEach((text, idx) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = text;
        if (card.answered) {
          btn.disabled = true;
          if (idx === card.correct) btn.classList.add("correct");
          if (idx === card.chosen && idx !== card.correct) btn.classList.add("wrong");
        } else {
          btn.onclick = async () => {
            try { await api("answer", {choice:idx}); showCard(); }
            catch (err) { alert(err.message); }
          };
        }
        choices.appendChild(btn);
      });
      modalActions.innerHTML = `<button id="doneCard" ${card.answered ? "" : "disabled"}>확인</button>`;
      document.getElementById("doneCard").onclick = closeModal;
      openModal();
    }
    function showResults() {
      if (modal.dataset.auto === "result") return;
      modal.dataset.auto = "result";
      modalTitle.textContent = "최종 결과";
      modalBody.innerHTML = `<p class="question">${state.finishedReason || "게임을 마쳤습니다."}</p><div class="results">${state.ranking.map((p, i) => `<div class="result-row"><span class="token" style="--piece:${p.color}">${pieceFor(p.id)}</span><div><b>${i + 1}위 ${p.name}${p.bankrupt ? " (파산)" : ""}</b><small>도장 ${p.stamps.length}개 · 대륙 ${new Set(p.continents).size}곳 · 현금 ${p.score}M</small></div><b>총 자산 ${p.netWorth}M</b></div>`).join("")}</div>`;
      modalActions.innerHTML = `<button class="good" id="closeResult">확인</button>`;
      document.getElementById("closeResult").onclick = closeModal;
      openModal();
    }
    function openModal() { modal.classList.add("open"); }
    function closeModal() { modal.classList.remove("open"); modal.dataset.auto = ""; }

    document.getElementById("joinButton").onclick = async () => {
      try { await api("join", {name:document.getElementById("playerName").value}); }
      catch (err) { alert(err.message); }
    };
    document.getElementById("leaveButton").onclick = () => {
      localStorage.removeItem("worldBlueMarbleLanPlayerId");
      myId = "";
      alert("이 기기의 참가 정보만 지웠습니다. 방에서 학생을 지우려면 새 방을 눌러 다시 시작하세요.");
    };
    document.getElementById("startGame").onclick = async () => { try { await api("start"); } catch (err) { alert(err.message); } };
    document.getElementById("resetGame").onclick = async () => {
      if (confirm("현재 방을 지우고 새로 시작할까요? 모든 기기의 게임이 초기화됩니다.")) {
        localStorage.removeItem("worldBlueMarbleLanPlayerId");
        myId = "";
        lastCardId = "";
        board.dataset.ready = "";
        closeModal();
        await api("reset");
      }
    };
    document.getElementById("endGame").onclick = async () => { try { await api("finish"); } catch (err) { alert(err.message); } };
    document.getElementById("rollDice").onclick = async () => {
      diceEl.classList.add("rolling");
      try { await api("roll"); }
      catch (err) { alert(err.message); }
      finally { setTimeout(() => diceEl.classList.remove("rolling"), 500); }
    };
    document.getElementById("showCard").onclick = showCard;
    document.getElementById("buySpace").onclick = async () => { try { await api("buy"); } catch (err) { alert(err.message); } };
    document.getElementById("sellSpace").onclick = async () => { try { await api("sell"); } catch (err) { alert(err.message); } };
    document.getElementById("escapeIsland").onclick = async () => { try { await api("escapeIsland"); } catch (err) { alert(err.message); } };
    document.getElementById("launchSpace").onclick = async () => {
      const target = Number(document.getElementById("launchTarget").value);
      try { await api("launch", {targetIndex: target}); } catch (err) { alert(err.message); }
    };
    document.getElementById("nextTurn").onclick = async () => { try { await api("next"); } catch (err) { alert(err.message); } };
    document.getElementById("closeModal").onclick = closeModal;

    document.getElementById("playerName").value = localStorage.getItem("worldBlueMarbleLanName") || "";
    document.getElementById("roomCode").value = roomCode;
    document.getElementById("roomCode").addEventListener("change", () => {
      roomValue();
      myId = "";
      localStorage.removeItem("worldBlueMarbleLanPlayerId");
      lastCardId = "";
      const url = new URL(location.href);
      url.searchParams.set("room", roomCode);
      history.replaceState(null, "", url);
      refresh();
    });
    document.getElementById("playerName").addEventListener("input", e => localStorage.setItem("worldBlueMarbleLanName", e.target.value));
    refresh();
    setInterval(refresh, 800);
  </script>
</body>
</html>
